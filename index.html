<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crop Rotation Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🌾 Crop Rotation Planner</h1>
    <p>Drag crops to plots. Avoid planting the same family two seasons in a row.</p>
  </header>

  <main>
    <!-- Farm grid (will be generated by JS) -->
    <div class="grid-container" id="farmGrid"></div>

    <!-- Sidebar with crops -->
    <aside class="sidebar">
      <h2>Crops</h2>
      <div class="crop-list" id="cropList"></div>
      <button id="saveBtn">💾 Save Plan</button>
      <button id="loadBtn">📂 Load Plan</button>
      <button id="clearBtn">🗑️ Clear Grid</button>
    </aside>
  </main>

  <footer>
    <p>Click on a plot to see rotation warnings.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
